services:
  db:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutritrack
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set a strong POSTGRES_PASSWORD in .env.production}"
      POSTGRES_DB: nutritrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutritrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: ./backend
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://nutritrack:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/nutritrack"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY with openssl rand -hex 32}"
      APP_ENV: production
    command: alembic upgrade head

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: "postgresql://nutritrack:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/nutritrack"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY with openssl rand -hex 32}"
      CORS_ORIGINS: "${CORS_ORIGINS:?Set public HTTPS CORS origins}"
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: strict
      PUBLIC_APP_URL: "${PUBLIC_APP_URL:?Set public HTTPS app URL}"
      SMTP_HOST: "${SMTP_HOST:?Set SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:?Set SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:?Set SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM:?Set SMTP_FROM}"
      SMTP_USE_TLS: "${SMTP_USE_TLS:-true}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:?Set production LLM endpoint}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:3b}"
      OLLAMA_TIMEOUT_SECONDS: "${OLLAMA_TIMEOUT_SECONDS:-30}"
      OLLAMA_MAX_RETRIES: "${OLLAMA_MAX_RETRIES:-2}"
      RATE_LIMIT_STORAGE_URI: redis://redis:6379/0
      TRUSTED_PROXY_CIDRS: "${TRUSTED_PROXY_CIDRS:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,127.0.0.1/32,::1/128}"
      CHROMA_PERSIST_DIR: /data/chroma
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-10485760}"
      PDF_MAX_PAGES: "${PDF_MAX_PAGES:-6}"
      PDF_OCR_MAX_PAGES: "${PDF_OCR_MAX_PAGES:-2}"
      PDF_EXTRACTION_TIMEOUT_SECONDS: "${PDF_EXTRACTION_TIMEOUT_SECONDS:-20}"
    volumes:
      - nutritrack_data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - backend

  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine@sha256:65e3e85dbaed8ba248841d9d58a899b6197106c23cb0ff1a132b7bfe0547e4c0
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
  redisdata:
  nutritrack_data:
